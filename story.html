# iTabs Quote Estimator

Build interactive, mobile-first quote estimators that educate customers while they choose. Each option includes contextual i-buttons that explain WHY things cost what they cost.

## Core Concept: Progressive Disclosure

iTabs uses layered information delivery:
- **Layer 1 — The Option**: What the customer sees and selects
- **Layer 2 — The i-Button**: Tap to reveal context, definitions, reasoning
- **Layer 3 — The Detail**: Deep explanations for those who want them

The customer chooses their own depth. Experts skip through. Beginners tap every button. Same tool, different experience.

## Architecture

Each estimator is a **single HTML file** with zero dependencies:
- No frameworks (no React, no Vue, no Angular)
- No build tools (no npm, no webpack)
- No external APIs
- Works in any browser, any device, any hosting

Powered by a WIDGET_CONFIG JavaScript object that defines sections, options, pricing rules, and i-button educational content.

## i-Button Content Types

| Type | When to Use | Example |
|------|-------------|---------|
| definition | Explaining a term or concept | "H4 Treatment: A preservative process..." |
| context | Regulations, local conditions | "WA's Dividing Fences Act 1961..." |
| why-it-matters | Why this choice affects price/quality | "Coastal-rated materials prevent..." |
| related | Links, further resources | "Learn more at council website..." |

Every option should have at least one i-button. The educational content is what differentiates iTabs from a basic calculator.

## Pricing Logic

- **Base price**: pricePerUnit x quantity
- **Multipliers**: height, access difficulty, soil type
- **Add-ons**: gates, posts, removal of old fence
- **GST**: Always include, always show separately

Display both total and per-unit breakdown so customers can compare quotes.

## Output Requirements

- Single self-contained HTML file
- Mobile-first responsive (max-width: 430px centered)
- Dark mode default
- Running total visible at all times
- Share/copy quote summary button
- Business contact details and CTA
- All CSS and JS inline (only external: Google Fonts)

## Generating for a New Trade

1. Identify the key decision points — What does the customer choose?
2. Research pricing for your region
3. Write i-button content — explain WHY, not just WHAT
4. Structure the config following the schema above
5. Test with real scenarios

The educational content is what makes iTabs different. Invest time here.

        // App State
        let currentCard = 0;
        const totalCards = STORY_DATA.cards.length;

        // DOM Elements
        const cardsWrapper = document.getElementById('cardsWrapper');
        const progress = document.getElementById('progress');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTerm = document.getElementById('modalTerm');
        const modalType = document.getElementById('modalType');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const getSkillBtn = document.getElementById('getSkillBtn');
        const downloadToast = document.getElementById('downloadToast');

        function init() {
            for (let i = 0; i < totalCards; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment';
                progress.appendChild(segment);
            }

            STORY_DATA.cards.forEach((card, index) => {
                const cardEl = createCard(card, index);
                cardsWrapper.appendChild(cardEl);
            });

            updateCard(0);

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            getSkillBtn.addEventListener('click', downloadSkill);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') navigate(-1);
                if (e.key === 'ArrowRight') navigate(1);
                if (e.key === 'Escape') closeModal();
            });

            // Swipe on hero areas only — handled per card in createCard
        }

        function downloadSkill() {
            const blob = new Blob([SKILL_MD_CONTENT], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'SKILL.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            downloadToast.classList.add('show');
            setTimeout(() => downloadToast.classList.remove('show'), 2500);
        }

        function createCard(card, index) {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.dataset.index = index;

            const [gradStart, gradEnd] = card.heroGradient;

            const showLeftArrow = index > 0;
            const showRightArrow = index < totalCards - 1;

            let iButtonsHTML = '';
            if (card.iButtons && card.iButtons.length > 0) {
                const buttons = card.iButtons.map(btn => {
                    const label = btn.term || (btn.type === 'why-it-matters' ? 'Why it matters' : btn.type);
                    return `<button class="i-button" data-type="${btn.type}" data-term="${btn.term || ''}" data-content="${encodeURIComponent(btn.content)}">
                        <span class="i-icon">i</span>
                        ${label}
                    </button>`;
                }).join('');
                iButtonsHTML = `<div class="i-buttons">${buttons}</div>`;
            }

            cardEl.innerHTML = `
                <div class="card-content">
                    <div class="card-hero" style="background: linear-gradient(135deg, ${gradStart}, ${gradEnd});">
                        <span class="hero-arrow hero-arrow-left ${showLeftArrow ? '' : 'hidden'}">‹</span>
                        <span class="hero-emoji">${card.heroEmoji}</span>
                        <span class="hero-arrow hero-arrow-right ${showRightArrow ? '' : 'hidden'}">›</span>
                        <div class="hero-nav-left"></div>
                        <div class="hero-nav-right"></div>
                    </div>
                    <div class="card-body">
                        <div class="card-number">${index + 1} of ${totalCards}</div>
                        <h2 class="card-headline">${card.headline}</h2>
                        <p class="card-summary">${card.summary}</p>
                        ${iButtonsHTML}
                    </div>
                </div>
            `;

            // Nav clicks on hero only
            cardEl.querySelector('.hero-nav-left').addEventListener('click', (e) => {
                e.stopPropagation();
                navigate(-1);
            });
            cardEl.querySelector('.hero-nav-right').addEventListener('click', (e) => {
                e.stopPropagation();
                navigate(1);
            });

            // Swipe on hero only
            const hero = cardEl.querySelector('.card-hero');
            let touchStartX = 0;
            hero.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            hero.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    navigate(diff > 0 ? 1 : -1);
                }
            });

            // i-button clicks
            cardEl.querySelectorAll('.i-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(
                        btn.dataset.term || getTypeLabel(btn.dataset.type),
                        btn.dataset.type,
                        decodeURIComponent(btn.dataset.content)
                    );
                });
            });

            return cardEl;
        }

        function getTypeLabel(type) {
            const labels = {
                'definition': 'Definition',
                'context': 'Context',
                'why-it-matters': 'Why It Matters',
                'related': 'Related'
            };
            return labels[type] || type;
        }

        function navigate(direction) {
            const newIndex = currentCard + direction;
            if (newIndex >= 0 && newIndex < totalCards) {
                updateCard(newIndex);
            }
        }

        function updateCard(index) {
            const cards = document.querySelectorAll('.card');
            const segments = document.querySelectorAll('.progress-segment');

            cards.forEach((card, i) => {
                card.classList.remove('active', 'prev');
                if (i === index) card.classList.add('active');
                else if (i < index) card.classList.add('prev');
            });

            segments.forEach((seg, i) => {
                seg.classList.remove('active', 'viewed');
                if (i === index) seg.classList.add('active');
                else if (i < index) seg.classList.add('viewed');
            });

            currentCard = index;
        }

        function openModal(term, type, content) {
            modalTerm.textContent = term;
            modalType.textContent = getTypeLabel(type);
            modalContent.textContent = content;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        init();
    </script>
</body>
